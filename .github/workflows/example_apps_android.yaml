name: Build Android example apps
on:
  workflow_dispatch:
    inputs:
      release-ref:
        type: string
        description: Branch or tag to build from. Defaults to main.
        required: false
        default: main
  workflow_call:
    inputs:
      release-ref:
        type: string
        description: Branch or tag to build from. Defaults to main.
        required: false
        default: main

jobs:
  build:
    name: Build & upload
    runs-on: ubuntu-latest
    steps:
    - name: Checkout project sources
      uses: actions/checkout@v4
      with:
        ref: ${{ inputs.release-ref || github.ref_name }}

    - name: Install JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'
        cache: gradle
    - name: Setup Android cmd line tools + NDK
      uses: ./.github/actions/common-android-setup
    - name: Accept Android SDK licenses
      run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses
    - name: Install Rust target
      run: rustup update && rustup target add aarch64-linux-android && rustup target add x86_64-linux-android
    - name: Build Android example app
      run: ./ci/prepare_example_apps_android.sh
      env:
        SKIP_PROTO_GEN: 1
    - name: Upload Android example apps
      uses: actions/upload-artifact@v4
      with:
        name: Android Example Apps
        path: ./dist/example-apps.android.zip
        if-no-files-found: error
