name: Release and Update SDK Version

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'The new version to release, ex: 0.12.0'
        required: true
        type: string
      emergency:
        type: boolean
        description: Ignore main branch requirement (SOC2 compliance)
        required: true
      platform:
        type: choice
        description: Which platform(s) to release
        required: true
        default: all
        options:
          - all
          - android
          - ios
          - react-native
      android-artifacts:
        type: choice
        description: Which Android artifacts to publish (ignored if platform is ios or react-native)
        required: true
        default: all
        options:
          - all
          - capture-only
      capture-suffix:
        type: string
        description: 'Custom Android capture artifact suffix including separator (e.g. "-no-jank-stats" -> io.bitdrift:capture-no-jank-stats). Ignored if platform is ios or react-native. Leave empty for standard "capture".'
        required: false
        default: ''
      include-sdk-verification-file:
        type: boolean
        description: Include Google Play SDK verification file from GOOGLE_PLAY_SDK_VERIFICATION_PROPERTIES secret in the Android AAR.
        required: false
        default: true
      release-ref:
        type: string
        description: Branch or tag to release from. Defaults to main.
        required: false
        default: main
  workflow_call:
    inputs:
      version:
        description: 'The new version to release, ex: 0.12.0'
        required: true
        type: string
      emergency:
        type: boolean
        description: Ignore main branch requirement (SOC2 compliance)'
        required: true
      platform:
        type: string
        description: Which platform(s) to release (all, android, ios, react-native)
        required: false
        default: all
      android-artifacts:
        type: string
        description: Which Android artifacts to publish (all, capture-only)
        required: false
        default: all
      capture-suffix:
        type: string
        description: 'Custom Android capture artifact suffix including separator (e.g. "-no-jank-stats" -> io.bitdrift:capture-no-jank-stats). Ignored if platform is ios or react-native. Leave empty for standard "capture".'
        required: false
        default: ''
      include-sdk-verification-file:
        type: boolean
        description: Include Google Play SDK verification file from GOOGLE_PLAY_SDK_VERIFICATION_PROPERTIES secret in the Android AAR.
        required: false
        default: true
      release-ref:
        type: string
        description: Branch or tag to release from. Defaults to main.
        required: false
        default: main
    secrets: 
      OPEN_CAPTURE_SDK_PRS_APP_ID:
        required: true
      OPEN_CAPTURE_SDK_PRS_PRIVATE_KEY:
        required: true
      GOOGLE_PLAY_SDK_VERIFICATION_PROPERTIES:
        required: false
         
jobs:
  gh-release:
    if: ${{ inputs.platform != 'react-native' }}
    permissions:
      contents: write
    uses: ./.github/workflows/release_gh.yaml
    with:
      version: ${{ inputs.version }}
      platform: ${{ inputs.platform }}
      android-artifacts: ${{ inputs.android-artifacts }}
      capture-suffix: ${{ inputs.capture-suffix }}
      include-sdk-verification-file: ${{ inputs.include-sdk-verification-file }}
      release-ref: ${{ inputs.release-ref }}
    secrets: inherit
  public-release:
    if: ${{ inputs.platform != 'react-native' }}
    permissions:
      id-token: write # required to use OIDC authentication
      contents: read
    uses: ./.github/workflows/release_public.yaml
    with:
      version: ${{ inputs.version }}
      emergency: ${{ inputs.emergency }}
      platform: ${{ inputs.platform }}
      android-artifacts: ${{ inputs.android-artifacts }}
      capture-suffix: ${{ inputs.capture-suffix }}
      release-ref: ${{ inputs.release-ref }}
    secrets: inherit
    needs: gh-release
  capture-ios-release:
    if: ${{ inputs.platform == 'all' || inputs.platform == 'ios' }}
    uses: ./.github/workflows/release_capture_ios.yaml
    with:
      version: ${{ inputs.version }}
    needs: public-release
    secrets: inherit
  capture-react-release:
    if: ${{ always() && !failure() && !cancelled() && (inputs.platform == 'all' || inputs.platform == 'react-native') }}
    uses: ./.github/workflows/release_capture_react.yaml
    with:
      version: ${{ inputs.version }}
    needs: public-release
    secrets: inherit
