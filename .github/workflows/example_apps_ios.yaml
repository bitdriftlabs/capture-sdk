name: Build iOS example apps
on:
  workflow_dispatch:
    inputs:
      release-ref:
        type: string
        description: Branch or tag to build from. Defaults to main.
        required: false
        default: main
  workflow_call:
    inputs:
      release-ref:
        type: string
        description: Branch or tag to build from. Defaults to main.
        required: false
        default: main

jobs:
  build:
    name: Build & upload
    permissions:
      contents: write
    runs-on: macos-26
    steps:
      # Checkout repo to Github Actions runner
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.release-ref || github.ref_name }}
          fetch-depth: 0

      - name: Install dependencies
        run: ./ci/mac_ci_setup.sh
      - name: Build iOS example apps
        run: ./ci/prepare_example_apps_ios.sh
      - name: Upload iOS example apps to GH
        uses: actions/upload-artifact@v4
        with:
          name: iOS Example Apps
          path: dist/example-apps.ios.zip
          if-no-files-found: error
